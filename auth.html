<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PromptCash — Вход для рекламодателей</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{max-width:440px;width:100%}
.logo{text-align:center;font-size:22px;font-weight:800;margin-bottom:8px}
.logo em{color:#10a37f;font-style:normal}
.subtitle{text-align:center;color:#888;font-size:14px;margin-bottom:32px}
.card{background:#111;border:1px solid #252525;border-radius:16px;padding:32px}
.tabs{display:flex;background:#1a1a1a;border-radius:10px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:10px;border-radius:7px;border:none;background:none;color:#888;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.tab.active{background:#111;color:#fff;border:1px solid #252525}
.form{display:none}
.form.active{display:block}
.fg{margin-bottom:18px}
.fl{display:block;font-size:12px;font-weight:600;color:#888;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px}
.fi{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:11px 14px;color:#f0f0f0;font-size:14px;font-family:'Inter',sans-serif;outline:none}
.fi:focus{border-color:#10a37f}
.fi::placeholder{color:#444}
select.fi{cursor:pointer}
.btn{width:100%;background:#10a37f;color:#fff;border:none;padding:13px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px}
.btn:hover{background:#12c49a}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-secondary{background:#1a1a1a;border:1px solid #333}
.btn-secondary:hover{background:#222}
.hint{font-size:11px;color:#555;margin-top:6px;line-height:1.5}
.alert{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:18px;line-height:1.5}
.alert.error{background:rgba(230,85,85,.1);border:1px solid rgba(230,85,85,.2);color:#e55}
.alert.success{background:rgba(16,163,127,.1);border:1px solid rgba(16,163,127,.2);color:#10a37f}
.back-link{display:block;text-align:center;margin-top:20px;color:#666;font-size:13px;text-decoration:none}
.back-link:hover{color:#888}

/* PENDING SCREEN */
.pending{display:none;text-align:center}
.pending .icon{font-size:48px;margin-bottom:16px}
.pending h2{font-size:18px;font-weight:800;margin-bottom:10px}
.pending p{color:#888;font-size:13px;line-height:1.6;margin-bottom:20px}
.pending strong{color:#fff}
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">💰 Prompt<em>Cash</em></div>
  <div class="subtitle">Рекламный кабинет</div>

  <div class="card">
    <div id="auth-forms">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Вход</button>
        <button class="tab" onclick="switchTab('register')">Регистрация</button>
      </div>

      <div id="alert-box"></div>

      <!-- LOGIN -->
      <div class="form active" id="form-login">
        <div class="fg">
          <label class="fl">Email</label>
          <input class="fi" type="email" id="login-email" placeholder="company@example.ru"/>
        </div>
        <div class="fg">
          <label class="fl">Пароль</label>
          <input class="fi" type="password" id="login-password" placeholder="••••••••"/>
        </div>
        <button class="btn" onclick="doLogin()" id="login-btn">Войти в кабинет</button>
      </div>

      <!-- REGISTER -->
      <div class="form" id="form-register">
        <div class="fg">
          <label class="fl">Название компании</label>
          <input class="fi" type="text" id="reg-company" placeholder="ООО Ромашка" maxlength="80"/>
        </div>
        <div class="fg">
          <label class="fl">Сфера деятельности</label>
          <select class="fi" id="reg-industry">
            <option value="">Загрузка...</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl">Сайт (необязательно)</label>
          <input class="fi" type="text" id="reg-website" placeholder="https://yoursite.ru"/>
        </div>
        <div class="fg">
          <label class="fl">Email</label>
          <input class="fi" type="email" id="reg-email" placeholder="company@example.ru"/>
        </div>
        <div class="fg">
          <label class="fl">Пароль</label>
          <input class="fi" type="password" id="reg-password" placeholder="Минимум 8 символов"/>
          <div class="hint">Минимум 8 символов</div>
        </div>
        <button class="btn" onclick="doRegister()" id="reg-btn">Создать аккаунт</button>
      </div>
    </div>

    <!-- PENDING VERIFICATION SCREEN -->
    <div class="pending" id="pending-screen">
      <div class="icon">📧</div>
      <h2>Проверьте почту</h2>
      <p>Мы отправили письмо на <strong id="pending-email"></strong> со ссылкой для подтверждения. Перейдите по ней, чтобы получить доступ к кабинету.</p>
      <p style="font-size:12px">Не пришло письмо? Проверьте папку «Спам» или запросите повторно.</p>
      <button class="btn btn-secondary" onclick="resendVerification()" id="resend-btn">Отправить письмо повторно</button>
    </div>
  </div>

  <a href="#" class="back-link">← Вернуться на сайт PromptCash</a>
</div>

<script>
const API = 'https://romptcash-backend.onrender.com';
const CABINET_URL = 'index.html';
let pendingEmail = '';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  document.getElementById('alert-box').innerHTML = '';
  event.target.classList.add('active');
  document.getElementById('form-' + tab).classList.add('active');
}

function showAlert(msg, type) {
  document.getElementById('alert-box').innerHTML = `<div class="alert ${type}">${msg}</div>`;
}

function showPendingScreen(email) {
  pendingEmail = email;
  document.getElementById('auth-forms').style.display = 'none';
  document.getElementById('pending-screen').style.display = 'block';
  document.getElementById('pending-email').textContent = email;
}

async function loadIndustries() {
  try {
    const res = await fetch(API + '/auth/industries');
    const industries = await res.json();
    const sel = document.getElementById('reg-industry');
    sel.innerHTML = '<option value="">Выберите сферу</option>' +
      industries.map(i => `<option value="${i}">${i}</option>`).join('');
  } catch(e) { console.error('industries error', e); }
}
loadIndustries();

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showAlert('Заполните email и пароль', 'error');

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Входим...';

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      if (data.needsVerification) {
        showPendingScreen(email);
        return;
      }
      throw new Error(data.error);
    }

    localStorage.setItem('pc_api_key', data.apiKey);
    localStorage.setItem('pc_advertiser', JSON.stringify(data.advertiser));
    showAlert('Успешный вход! Переход в кабинет...', 'success');
    setTimeout(() => window.location.href = CABINET_URL, 800);
  } catch(e) {
    showAlert(e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Войти в кабинет';
  }
}

async function doRegister() {
  const companyName = document.getElementById('reg-company').value;
  const industry = document.getElementById('reg-industry').value;
  const website = document.getElementById('reg-website').value;
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;

  if (!companyName) return showAlert('Введите название компании', 'error');
  if (!industry) return showAlert('Выберите сферу деятельности', 'error');
  if (!email) return showAlert('Введите email', 'error');
  if (!password || password.length < 8) return showAlert('Пароль должен быть не менее 8 символов', 'error');

  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.textContent = 'Регистрируем...';

  try {
    const res = await fetch(API + '/auth/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ companyName, industry, website, email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    if (data.needsVerification) {
      showPendingScreen(email);
      return;
    }

    localStorage.setItem('pc_api_key', data.apiKey);
    localStorage.setItem('pc_advertiser', JSON.stringify(data.advertiser));
    showAlert('Регистрация успешна! Переход в кабинет...', 'success');
    setTimeout(() => window.location.href = CABINET_URL, 800);
  } catch(e) {
    showAlert(e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Создать аккаунт';
  }
}

async function resendVerification() {
  const btn = document.getElementById('resend-btn');
  btn.disabled = true;
  btn.textContent = 'Отправляем...';
  try {
    const res = await fetch(API + '/auth/resend-verification', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: pendingEmail })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    btn.textContent = 'Письмо отправлено ✓';
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Отправить письмо повторно'; }, 3000);
  } catch(e) {
    btn.textContent = 'Ошибка: ' + e.message;
    btn.disabled = false;
  }
}
</script>
</body>
</html>
